<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>MRM Masterclass</title><style>body{font-family:Arial;margin:0;background:#f5f7fb}.wrap{max-width:1100px;margin:0 auto;padding:20px}.hero,.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 4px 18px rgba(0,0,0,.08)}.grid{display:grid;grid-template-columns:2fr 1fr;gap:16px}.cal{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.day{min-height:90px;background:#fff;border-radius:10px;padding:8px}.today{outline:2px solid #1d4ed8}.event{background:#e0e7ff;border-radius:8px;padding:4px;margin-top:4px;font-size:12px;cursor:pointer}input[type=checkbox]{width:auto} @media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body><div class="wrap"><section class="hero"><h1>Low Brass Masterclass Calendar</h1><p>Browse upcoming masterclasses, register securely, and receive Google Meet details by email.</p></section><div class="grid" style="margin-top:16px"><section class="card"><h2 id="month"></h2><div><button onclick="shift(-1)">Prev</button><button onclick="shift(1)">Next</button></div><div class="cal" id="cal"></div></section><aside class="card"><h3>Upcoming Events</h3><div id="up"></div></aside></div></div><script src="https://js.stripe.com/v3/"></script><script>const API='/wp-json/mrm-masterclass/v1';let events=[],settings={},cursor=new Date();async function boot(){settings=await (await fetch(API+'/settings-public')).json();events=await (await fetch(API+'/events')).json();render();upcoming()}function shift(n){cursor.setMonth(cursor.getMonth()+n);render()}function render(){const y=cursor.getFullYear(),m=cursor.getMonth();document.getElementById('month').textContent=cursor.toLocaleString([], {month:'long',year:'numeric'});const d=new Date(y,m,1),start=d.getDay(),days=new Date(y,m+1,0).getDate();const cal=document.getElementById('cal');cal.innerHTML=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(x=>`<strong>${x}</strong>`).join('');for(let i=0;i<start;i++)cal.innerHTML+='<div></div>';for(let i=1;i<=days;i++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;const de=document.createElement('div');de.className='day'+(new Date().toDateString()===new Date(y,m,i).toDateString()?' today':'');de.innerHTML=`<div>${i}</div>`;events.filter(e=>e.start_time.startsWith(ds)).forEach(e=>{const a=document.createElement('div');a.className='event';a.textContent=`${e.title} • $${(e.price_cents/100).toFixed(2)}`;a.onclick=()=>register(e);de.appendChild(a)});cal.appendChild(de)}}function upcoming(){document.getElementById('up').innerHTML=events.slice(0,6).map(e=>`<div style='margin:8px 0'><strong>${e.title}</strong><br>${new Date(e.start_time+'Z').toLocaleString()}<br>${e.presenter_name||'TBA'} • Seats ${e.available_seats}</div>`).join('')}async function register(e){const email=prompt('Email');const fn=prompt('First name');const ln=prompt('Last name');if(!email||!fn||!ln)return;const pi=await (await fetch(API+'/create-payment-intent',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:e.id,email,terms_accepted:true})})).json();const stripe=Stripe(pi.publishable_key);const {error,paymentIntent}=await stripe.confirmCardPayment(pi.client_secret,{payment_method:{card:{token:'tok_visa'},billing_details:{email,name:fn+' '+ln}}});if(error){alert(error.message);return;}await fetch(API+'/finalize-registration',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:e.id,payment_intent_id:paymentIntent.id,first_name:fn,last_name:ln,email,terms_accepted:true})});alert('Registered! Check your email for Google Meet and invite details.')}boot();</script></body></html>
