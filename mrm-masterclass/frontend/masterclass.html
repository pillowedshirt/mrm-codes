<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Low Brass Lessons Masterclasses</title>

  <script src="https://js.stripe.com/v3/"></script>

  <style>
    :root { --ink:#1f2933;--muted:#6b7280;--paper:#fffaf2;--cream:#f6f1e8;--card:#ffffff;--brass:#9f6b2d;--brass-dark:#6f431f;--blue:#1f4f68;--border:#e3d7c4;--shadow:0 18px 45px rgba(31,41,51,.14);}*{box-sizing:border-box;}body{margin:0;background:radial-gradient(circle at top left, rgba(159,107,45,.18), transparent 32rem),linear-gradient(180deg, #fffaf2 0%, var(--cream) 100%);color:var(--ink);font-family:Georgia,"Times New Roman",serif}.mc-wrap{max-width:1120px;margin:0 auto;padding:42px 18px 70px}.mc-intro{background:linear-gradient(135deg, rgba(31,79,104,.97), rgba(31,41,51,.98)),#1f2933;color:#fff;border-radius:28px;padding:clamp(26px, 5vw, 46px);box-shadow:var(--shadow);overflow:hidden;position:relative}.mc-intro::after{content:"";position:absolute;right:-80px;top:-80px;width:260px;height:260px;border-radius:50%;background:rgba(245,198,122,.18)}.mc-eyebrow{font-family:Arial,sans-serif;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#f6d59b;margin:0 0 10px}.mc-intro h1{margin:0 0 14px;font-size:clamp(36px, 6vw, 62px);line-height:.96;letter-spacing:-.04em;position:relative;z-index:1}.mc-intro p{max-width:760px;margin:0;font-family:Arial,sans-serif;font-size:17px;line-height:1.7;color:rgba(255,255,255,.88);position:relative;z-index:1}.mc-instructions{margin-top:18px;background:rgba(255,255,255,.78);border:1px solid var(--border);border-radius:22px;padding:18px 20px;font-family:Arial,sans-serif;color:var(--muted);line-height:1.6}.calendar-shell{margin-top:26px;background:rgba(255,255,255,.76);border:1px solid var(--border);border-radius:28px;padding:22px;box-shadow:0 14px 38px rgba(31,41,51,.08)}.calendar-toolbar{display:grid;grid-template-columns:54px 1fr 54px;align-items:center;gap:14px;text-align:center;margin-bottom:18px}.month-arrow{width:54px;height:54px;border-radius:50%;border:1px solid var(--border);background:#fff;color:var(--brass-dark);font-size:34px;line-height:1;cursor:pointer;box-shadow:0 8px 20px rgba(31,41,51,.08)}.month-arrow:hover{background:#fff8ec;transform:translateY(-1px)}#monthLabel{margin:0;font-size:clamp(28px, 4vw, 42px);letter-spacing:-.03em}.weekdays{display:grid;grid-template-columns:repeat(7, 1fr);gap:10px;margin-bottom:10px;color:var(--muted);font-family:Arial,sans-serif;font-size:12px;font-weight:800;letter-spacing:.08em;text-align:center;text-transform:uppercase}.calendar-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:10px}.day{min-height:132px;background:var(--card);border:1px solid #eadfce;border-radius:18px;padding:10px;box-shadow:0 8px 22px rgba(31,41,51,.05)}.day.empty{opacity:.42;background:rgba(255,255,255,.45)}.date-num{margin:0 0 8px;font-family:Arial,sans-serif;font-size:13px;font-weight:800;color:var(--muted)}.event-button{display:block;width:100%;margin:6px 0 0;padding:8px 9px;border-radius:12px;background:linear-gradient(135deg, #f4dfb9, #d9a85a);color:#2e1c0d;font-family:Arial,sans-serif;font-size:12px;font-weight:800;text-align:left;border:0;cursor:pointer}.modal{position:fixed;inset:0;z-index:9999;background:rgba(18,24,31,.58);display:none;align-items:center;justify-content:center;padding:20px}.modal-card{width:min(680px, 95vw);max-height:90vh;overflow:auto;background:#fffaf2;border:1px solid var(--border);border-radius:26px;padding:26px;box-shadow:var(--shadow}.modal-card h2{margin-top:0;font-size:32px;line-height:1.05}.modal-meta{font-family:Arial,sans-serif;color:var(--muted);line-height:1.6}input:not([type="checkbox"]){width:100%;padding:13px 14px;margin:8px 0;border:1px solid var(--border);border-radius:14px;background:#fff;color:var(--ink);font-family:Arial,sans-serif}label{display:block;margin:14px 0;font-family:Arial,sans-serif;color:var(--ink);line-height:1.5}input[type="checkbox"]{width:auto;margin-right:8px}.primary-btn,.secondary-btn{width:100%;padding:13px 16px;border-radius:14px;font-family:Arial,sans-serif;font-weight:800;cursor:pointer;margin-top:10px}.primary-btn{border:0;background:linear-gradient(135deg,var(--brass),var(--brass-dark));color:#fff}.secondary-btn{border:1px solid var(--border);background:#fff;color:var(--ink)}.message{margin-top:12px;font-family:Arial,sans-serif;color:var(--muted)}
  </style>
</head><body></body></html>
