<!doctype html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>MRM Masterclass</title>
<style>body{font-family:Arial;margin:0;background:#f7f8fb;color:#1b1f23}.wrap{max-width:1100px;margin:0 auto;padding:24px}.hero{background:#111827;color:#fff;padding:24px;border-radius:12px}.controls{display:flex;justify-content:space-between;align-items:center;margin:16px 0}.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{background:#fff;min-height:110px;border-radius:8px;padding:8px}.day h4{margin:0 0 8px;font-size:13px}.evt{background:#dbeafe;padding:6px;border-radius:6px;cursor:pointer;margin-bottom:4px;font-size:12px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center}.modal .card{background:#fff;width:min(640px,95vw);border-radius:12px;padding:18px;max-height:90vh;overflow:auto}input:not([type="checkbox"]), textarea, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  box-sizing: border-box;
}

input[type="checkbox"] {
  width: auto;
  margin-right: 8px;
}button{background:#111827;color:#fff;border:0;border-radius:8px;cursor:pointer}</style>
<script src="https://js.stripe.com/v3/"></script>
</head>
<body>
<div class="wrap"><div class="hero"><h1>Low Brass Lessons Masterclasses</h1><p>Join upcoming online masterclasses.</p></div>
<div class="controls"><button id="prev">Previous</button><h2 id="monthLabel"></h2><button id="next">Next</button></div>
<div class="weekdays">
  <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
</div>
<div class="grid" id="calendar"></div>
<h2>Upcoming Masterclasses</h2>
<div id="upcomingEvents" class="upcoming"></div></div>

<div class="modal" id="eventModal"><div class="card"><h3 id="evtTitle"></h3><p id="evtMeta"></p><p id="evtDesc"></p><button id="openReg">Register ($20)</button><button onclick="closeModal('eventModal')">Close</button></div></div>
<div class="modal" id="registerModal"><div class="card"><h3>Register</h3><input id="firstName" placeholder="First name"><input id="lastName" placeholder="Last name"><input id="email" type="email" placeholder="Email"><label><input id="terms" type="checkbox"> I agree to Terms of Service.</label><button id="startCheckout">Continue to Checkout</button><button onclick="closeModal('registerModal')">Close</button></div></div>
<div class="modal" id="paymentModal"><div class="card"><h3>Checkout</h3><div id="paymentElement"></div><button id="payBtn">Pay $20</button><div id="payMsg"></div></div></div>
<div class="modal" id="successModal"><div class="card"><h3>Success</h3><p>You are registered.</p><button onclick="closeModal('successModal')">Close</button></div></div>
<div class="modal" id="unmuteModal"><div class="card"><h3>Request to Unmute</h3><input id="umName" placeholder="Your name"><input id="umEmail" placeholder="Your email"><textarea id="umNote" placeholder="Why you'd like to unmute"></textarea><button id="umSubmit">Send request</button><p id="umMsg"></p><button onclick="closeModal('unmuteModal')">Close</button></div></div>

<script>
const masterclassApiBase = '/wp-json/mrm-masterclass/v1';
let current=new Date(),events=[],selectedEvent=null,stripe,elements,clientSecret;

function renderUpcomingEvents() {
  const box = document.getElementById('upcomingEvents');
  if (!box) return;
  const upcoming = [...events].sort((a,b)=>new Date(a.start_time)-new Date(b.start_time)).slice(0,6);
  if (!upcoming.length) { box.innerHTML = '<p>No upcoming masterclasses are currently open for registration.</p>'; return; }
  box.innerHTML = upcoming.map(e => `
    <div class="upcoming-card">
      <h3>${escapeHtml(e.title)}</h3>
      <p><strong>Date:</strong> ${formatEventDate(e.start_time)}</p>
      <p><strong>Presenter:</strong> ${escapeHtml(e.presenter_name || 'TBA')}</p>
      <p><strong>Price:</strong> $${(Number(e.price_cents || 0) / 100).toFixed(2)}</p>
      <p><strong>Seats:</strong> ${Number(e.available_seats || 0)} available</p>
      <button type="button" onclick="openEventById(${Number(e.id)})">View Details</button>
    </div>
  `).join('');
}
function formatEventDate(value){ const d=new Date(value.replace(' ','T')); if(Number.isNaN(d.getTime())) return value; return d.toLocaleString([], {weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
function escapeHtml(value){ return String(value||'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s])); }
function openEventById(id){ const el=document.querySelector(`.evt[data-id="${id}"]`); if(el){el.click();return;} const event=events.find(e=>Number(e.id)===Number(id)); if(!event)return; selectedEvent=event; document.getElementById('evtTitle').textContent=event.title; document.getElementById('evtMeta').textContent=`${formatEventDate(event.start_time)} • ${event.presenter_name || 'TBA'} • $${(Number(event.price_cents || 0) / 100).toFixed(2)}`; document.getElementById('evtDesc').textContent=event.description||''; openModal('eventModal'); }

function openModal(id){document.getElementById(id).style.display='flex'} function closeModal(id){document.getElementById(id).style.display='none'}
async function loadEvents(){
  try {
    const response = await fetch(`${masterclassApiBase}/events`);
    events = await response.json();
    if (!Array.isArray(events)) events = [];
    renderCalendar();
    renderUpcomingEvents();
  } catch (error) {
    events = [];
    renderCalendar();
    renderUpcomingEvents();
    console.error(error);
  }
}
function renderCalendar(){const cal=document.getElementById('calendar'); cal.innerHTML=''; const y=current.getFullYear(),m=current.getMonth(); document.getElementById('monthLabel').textContent=current.toLocaleString([], {month:'long', year:'numeric'}); const first=new Date(y,m,1),start=first.getDay(),days=new Date(y,m+1,0).getDate(); for(let i=0;i<start;i++){cal.insertAdjacentHTML('beforeend','<div class="day"></div>')} for(let d=1;d<=days;d++){const key=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const ev=events.filter(e=>e.start_time.startsWith(key)); const cell=document.createElement('div'); cell.className='day'; cell.innerHTML=`<h4>${d}</h4>`+ev.map(e=>`<div class='evt' data-id='${e.id}'>${e.title}</div>`).join(''); cal.appendChild(cell);} document.querySelectorAll('.evt').forEach(n=>n.onclick=()=>showEvent(parseInt(n.dataset.id,10))); }
function showEvent(id){selectedEvent=events.find(e=>e.id===id); document.getElementById('evtTitle').textContent=selectedEvent.title; document.getElementById('evtMeta').textContent=`${selectedEvent.start_time} (${selectedEvent.timezone}) • ${selectedEvent.presenter_name||'TBA'}`; document.getElementById('evtDesc').textContent=selectedEvent.description||''; openModal('eventModal');}
async function startCheckout(){ if(!document.getElementById('terms').checked){alert('Terms required');return;} const body={event_id:selectedEvent.id,email:email.value,terms_accepted:true}; const r=await fetch(`${masterclassApiBase}/create-payment-intent`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); const j=await r.json(); clientSecret=j.client_secret; stripe=Stripe(j.publishable_key); elements=stripe.elements({clientSecret}); elements.create('payment').mount('#paymentElement'); openModal('paymentModal'); }
async function pay(){ const {error}=await stripe.confirmPayment({elements,redirect:'if_required'}); if(error){payMsg.textContent=error.message;return;} const pi=clientSecret.split('_secret')[0]; await fetch(`${masterclassApiBase}/finalize-registration`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:selectedEvent.id,payment_intent_id:pi,first_name:firstName.value,last_name:lastName.value,email:email.value})}); closeModal('paymentModal'); openModal('successModal'); }
async function submitUnmute(){const res=await fetch(`${masterclassApiBase}/unmute-request`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:selectedEvent?.id||0,participant_name:umName.value,participant_email:umEmail.value,request_note:umNote.value})}); const j=await res.json(); umMsg.textContent=j.message||'Sent';}
prev.onclick=()=>{current.setMonth(current.getMonth()-1);renderCalendar()}; next.onclick=()=>{current.setMonth(current.getMonth()+1);renderCalendar()}; openReg.onclick=()=>openModal('registerModal'); startCheckout.onclick=startCheckout; payBtn.onclick=pay; umSubmit.onclick=submitUnmute; loadEvents();
</script>
</body></html>
